apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: devboard-gateway
  namespace: devboard
spec:
  selector:
    # Routes traffic through the Istio ingress gateway pod
    istio: ingress
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
    # TLS (enable after cert-manager setup)
