apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: devboard
  namespace: devboard
spec:
  hosts:
    - "*"
  gateways:
    - devboard-gateway
  http:
    # SSE (Server-Sent Events) – no timeout, no retries
    - match:
        - uri:
            prefix: /api/notifications/
      route:
        - destination:
            host: api-gateway
            port:
              number: 8080

    # All other traffic
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: api-gateway
            port:
              number: 8080
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,retriable-4xx
