apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: devboard
spec:
  # PERMISSIVE: allow both mTLS and plain HTTP
  # Pod-to-pod traffic via Envoy uses mTLS automatically (auto-mTLS).
  # STRICT was blocking Go services that bypass Envoy due to
  # Cilium eBPF + native sidecar not redirecting outbound traffic.
  mtls:
    mode: PERMISSIVE
